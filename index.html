<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STONKS — Live Market Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --surface: #0d1318;
    --surface2: #111920;
    --border: #1e2d3a;
    --green: #00f5a0;
    --red: #ff3d6b;
    --amber: #ffb800;
    --blue: #00aaff;
    --text: #d4e8f0;
    --muted: #4a6878;
    --card-glow-green: rgba(0,245,160,0.06);
    --card-glow-red: rgba(255,61,107,0.06);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,170,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,170,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #fff;
  }
  .logo span { color: var(--green); }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .pulse-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(0.8); }
  }

  /* ── Add Stock Form ── */
  .add-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    align-items: stretch;
  }

  .add-bar input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 14px 20px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    max-width: 260px;
  }
  .add-bar input::placeholder {
    color: var(--muted);
    font-weight: 400;
    letter-spacing: 1px;
  }
  .add-bar input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(0,170,255,0.12);
  }

  .add-bar button {
    background: var(--green);
    color: #080c10;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 14px 28px;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .add-bar button:hover { opacity: 0.88; transform: translateY(-1px); }
  .add-bar button:active { transform: translateY(0); }

  .slot-counter {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-left: 4px;
    display: flex;
    align-items: center;
  }
  .slot-counter.full { color: var(--amber); }

  .error-msg {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--red);
    margin-top: 8px;
    min-height: 16px;
    letter-spacing: 0.5px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }

  /* ── Stock Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    transition: border-color 0.3s;
  }
  @keyframes slideIn {
    from { opacity:0; transform:translateY(16px) scale(0.97); }
    to   { opacity:1; transform:none; }
  }
  .card.up   { border-color: rgba(0,245,160,0.25); background: linear-gradient(135deg, var(--surface) 0%, var(--card-glow-green) 100%); }
  .card.down { border-color: rgba(255,61,107,0.20); background: linear-gradient(135deg, var(--surface) 0%, var(--card-glow-red) 100%); }

  .card-glow {
    position: absolute;
    top: -60px; right: -60px;
    width: 180px; height: 180px;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.12;
    pointer-events: none;
    transition: opacity 0.5s;
  }
  .card.up   .card-glow { background: var(--green); }
  .card.down .card-glow { background: var(--red); }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }

  .ticker {
    font-family: 'Space Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 1px;
  }
  .company-name {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
    font-weight: 400;
    max-width: 180px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .remove-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    width: 28px; height: 28px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s, color 0.2s;
    flex-shrink: 0;
  }
  .remove-btn:hover { border-color: var(--red); color: var(--red); }

  .price-row {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    margin-bottom: 8px;
  }

  .price {
    font-family: 'Space Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: -1px;
    transition: color 0.3s;
  }
  .price.flash-up   { color: var(--green); }
  .price.flash-down { color: var(--red); }

  .change-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 4px;
    transition: background 0.3s, color 0.3s;
  }
  .change-pill.up   { background: rgba(0,245,160,0.12); color: var(--green); }
  .change-pill.down { background: rgba(255,61,107,0.12); color: var(--red); }

  .meta-row {
    display: flex;
    gap: 20px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .meta-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  .meta-value {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--text);
  }

  /* ── Sparkline ── */
  .chart-wrap {
    height: 72px;
    position: relative;
    margin: 0 -4px;
  }
  .chart-wrap canvas { width: 100% !important; }

  /* ── Loading skeleton ── */
  .skeleton .price    { background: var(--border); border-radius: 4px; color: transparent; }
  .skeleton .ticker   { background: var(--border); border-radius: 4px; color: transparent; width: 60px; }

  .loading-bar {
    height: 72px;
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 4px;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ── Empty State ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .empty-state .big-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.4; }
  .empty-state h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
  }
  .empty-state p {
    font-size: 14px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
  }

  /* ── Market Status Bar ── */
  .market-bar {
    display: flex;
    gap: 24px;
    margin-bottom: 28px;
    padding: 12px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    overflow-x: auto;
    white-space: nowrap;
    align-items: center;
    letter-spacing: 0.5px;
  }
  .market-bar .item { display: flex; align-items: center; gap: 6px; }
  .market-bar .val  { color: var(--text); }
  .market-bar .sep  { color: var(--border); }

  /* ── Tooltip ── */
  .api-note {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 32px;
    letter-spacing: 0.5px;
    line-height: 1.8;
  }
  .api-note a { color: var(--blue); text-decoration: none; }
  .api-note a:hover { text-decoration: underline; }

  @media (max-width: 560px) {
    .grid { grid-template-columns: 1fr; }
    .add-bar input { max-width: 100%; }
    header { flex-wrap: wrap; gap: 12px; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo">STONKS<span>.</span></div>
    <div class="live-badge">
      <div class="pulse-dot"></div>
      <span id="market-status-label">LIVE TRACKING</span>
    </div>
  </header>

  <div class="market-bar" id="market-bar">
    <div class="item">🕐 <span id="clock" class="val">--:--:--</span></div>
    <div class="sep">|</div>
    <div class="item">TRACKED <span id="track-count" class="val">0/6</span></div>
    <div class="sep">|</div>
    <div class="item">LAST REFRESH <span id="last-refresh" class="val">—</span></div>
    <div class="sep">|</div>
    <div class="item">DATA <span class="val" style="color:var(--amber)">YAHOO FINANCE</span></div>
  </div>

  <div class="add-bar">
    <input type="text" id="ticker-input" maxlength="10" placeholder="Enter ticker (e.g. AAPL)" />
    <button id="add-btn" onclick="addStock()">+ Add Stock</button>
    <div class="slot-counter" id="slot-counter">0 / 6 slots used</div>
  </div>
  <div class="error-msg" id="error-msg"></div>

  <div class="grid" id="grid">
    <div class="empty-state">
      <div class="big-icon">📈</div>
      <h2>No stocks tracked yet</h2>
      <p>Type a ticker symbol above and press + Add Stock</p>
    </div>
  </div>

  <div class="api-note">
    Data sourced via Yahoo Finance proxy · Prices refresh every 30 seconds · Up to 6 stocks<br>
    <a href="https://finance.yahoo.com" target="_blank">finance.yahoo.com</a>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ── State ──────────────────────────────────────────
const MAX_STOCKS = 6;
let stocks = []; // [{ticker, name, price, change, changePct, open, high, low, volume, history[], chart}]
const REFRESH_INTERVAL = 30000;
let refreshTimer = null;

// ── Yahoo Finance via allorigins proxy ──────────────
async function fetchQuote(ticker) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=2m&range=1d`;
  const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  const res = await fetch(proxy);
  if (!res.ok) throw new Error('Network error');
  const json = await res.json();
  const data = JSON.parse(json.contents);
  const result = data?.chart?.result?.[0];
  if (!result) throw new Error('No data');
  const meta = result.meta;
  const closes = result.indicators?.quote?.[0]?.close || [];
  const timestamps = result.timestamp || [];
  // Build history: last 40 valid points
  const history = [];
  for (let i = 0; i < closes.length; i++) {
    if (closes[i] !== null && closes[i] !== undefined) {
      history.push({ t: timestamps[i], v: closes[i] });
    }
  }
  const price = meta.regularMarketPrice;
  const prevClose = meta.chartPreviousClose || meta.previousClose || price;
  const change = price - prevClose;
  const changePct = (change / prevClose) * 100;
  return {
    ticker: meta.symbol,
    name: meta.shortName || meta.symbol,
    price,
    change,
    changePct,
    open: meta.regularMarketOpen || prevClose,
    high: meta.regularMarketDayHigh || price,
    low:  meta.regularMarketDayLow  || price,
    volume: meta.regularMarketVolume || 0,
    history: history.slice(-60),
  };
}

// ── Add stock ───────────────────────────────────────
async function addStock() {
  const input = document.getElementById('ticker-input');
  const ticker = input.value.trim().toUpperCase();
  if (!ticker) return showError('Please enter a ticker symbol.');
  if (stocks.length >= MAX_STOCKS) return showError(`Maximum of ${MAX_STOCKS} stocks reached.`);
  if (stocks.find(s => s.ticker === ticker)) return showError(`${ticker} is already tracked.`);

  showError('');
  input.value = '';
  const cardId = `card-${ticker}`;
  addPlaceholderCard(ticker, cardId);

  try {
    const quote = await fetchQuote(ticker);
    quote.history = quote.history;
    stocks.push({ ...quote, id: cardId });
    renderCard(quote, cardId);
    updateUI();
  } catch(e) {
    removeCard(cardId);
    showError(`Could not find "${ticker}". Check the ticker and try again.`);
  }
}

// ── Remove stock ────────────────────────────────────
function removeStock(ticker) {
  const idx = stocks.findIndex(s => s.ticker === ticker);
  if (idx === -1) return;
  const s = stocks[idx];
  if (s.chart) s.chart.destroy();
  stocks.splice(idx, 1);
  removeCard(`card-${ticker}`);
  updateUI();
}

function removeCard(id) {
  const el = document.getElementById(id);
  if (el) { el.style.opacity = '0'; el.style.transform = 'scale(0.94)'; setTimeout(() => el.remove(), 200); }
}

// ── Placeholder while loading ───────────────────────
function addPlaceholderCard(ticker, cardId) {
  hideEmpty();
  const grid = document.getElementById('grid');
  const div = document.createElement('div');
  div.id = cardId;
  div.className = 'card skeleton';
  div.style.transition = 'opacity 0.2s, transform 0.2s';
  div.innerHTML = `
    <div class="card-glow"></div>
    <div class="card-top">
      <div><div class="ticker">${ticker}</div><div class="company-name" style="background:var(--border);border-radius:3px;color:transparent;width:120px;height:12px;margin-top:4px"></div></div>
      <button class="remove-btn" onclick="removeStock('${ticker}')">✕</button>
    </div>
    <div class="price-row">
      <div class="price" style="background:var(--border);border-radius:4px;color:transparent;width:140px;height:32px"></div>
    </div>
    <div class="loading-bar"></div>`;
  grid.appendChild(div);
}

// ── Render / update a card ──────────────────────────
function renderCard(quote, cardId) {
  const existing = stocks.find(s => s.id === cardId);
  const card = document.getElementById(cardId);
  if (!card) return;

  const dir = quote.changePct >= 0 ? 'up' : 'down';
  const sign = quote.changePct >= 0 ? '+' : '';
  const arrow = dir === 'up' ? '▲' : '▼';

  card.className = `card ${dir}`;
  card.innerHTML = `
    <div class="card-glow"></div>
    <div class="card-top">
      <div>
        <div class="ticker">${quote.ticker}</div>
        <div class="company-name" title="${quote.name}">${quote.name}</div>
      </div>
      <button class="remove-btn" onclick="removeStock('${quote.ticker}')">✕</button>
    </div>
    <div class="price-row">
      <div class="price" id="price-${quote.ticker}">$${fmt(quote.price)}</div>
      <div class="change-pill ${dir}" id="pill-${quote.ticker}">
        ${arrow} ${sign}${fmt(quote.change)} (${sign}${quote.changePct.toFixed(2)}%)
      </div>
    </div>
    <div class="meta-row">
      <div class="meta-item"><div class="meta-label">Open</div><div class="meta-value">$${fmt(quote.open)}</div></div>
      <div class="meta-item"><div class="meta-label">High</div><div class="meta-value" id="high-${quote.ticker}">$${fmt(quote.high)}</div></div>
      <div class="meta-item"><div class="meta-label">Low</div><div class="meta-value" id="low-${quote.ticker}">$${fmt(quote.low)}</div></div>
      <div class="meta-item"><div class="meta-label">Vol</div><div class="meta-value">${fmtVol(quote.volume)}</div></div>
    </div>
    <div class="chart-wrap"><canvas id="spark-${quote.ticker}"></canvas></div>`;

  // Destroy old chart if any
  if (existing && existing.chart) existing.chart.destroy();

  // Draw sparkline
  setTimeout(() => drawSparkline(quote, dir), 50);
}

function drawSparkline(quote, dir) {
  const canvas = document.getElementById(`spark-${quote.ticker}`);
  if (!canvas) return;
  const vals = quote.history.map(h => h.v);
  const labels = quote.history.map(() => '');
  const color = dir === 'up' ? '#00f5a0' : '#ff3d6b';
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createLinearGradient(0, 0, 0, 72);
  gradient.addColorStop(0, dir === 'up' ? 'rgba(0,245,160,0.25)' : 'rgba(255,61,107,0.25)');
  gradient.addColorStop(1, 'transparent');

  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: vals,
        borderColor: color,
        borderWidth: 2,
        pointRadius: 0,
        fill: true,
        backgroundColor: gradient,
        tension: 0.4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 600, easing: 'easeInOutQuart' },
      plugins: { legend: { display: false }, tooltip: { enabled: false } },
      scales: {
        x: { display: false },
        y: { display: false }
      },
      elements: { line: { borderCapStyle: 'round' } }
    }
  });

  // Save chart ref for later destruction
  const s = stocks.find(s => s.ticker === quote.ticker);
  if (s) s.chart = chart;
}

// ── Refresh all stocks ──────────────────────────────
async function refreshAll() {
  for (const s of stocks) {
    try {
      const quote = await fetchQuote(s.ticker);
      // Flash price if changed
      const priceEl = document.getElementById(`price-${s.ticker}`);
      if (priceEl && quote.price !== s.price) {
        const dir = quote.price > s.price ? 'flash-up' : 'flash-down';
        priceEl.classList.add(dir);
        setTimeout(() => priceEl.classList.remove(dir), 800);
      }
      Object.assign(s, quote);
      renderCard(s, s.id);
    } catch(e) { /* silently skip */ }
  }
  document.getElementById('last-refresh').textContent = new Date().toLocaleTimeString();
}

// ── UI helpers ──────────────────────────────────────
function updateUI() {
  const count = stocks.length;
  document.getElementById('track-count').textContent = `${count}/6`;
  document.getElementById('slot-counter').textContent = `${count} / 6 slots used`;
  document.getElementById('slot-counter').className = `slot-counter${count >= MAX_STOCKS ? ' full' : ''}`;
  if (count === 0) showEmpty();
  else hideEmpty();

  // Restart timer
  clearInterval(refreshTimer);
  if (count > 0) {
    refreshTimer = setInterval(refreshAll, REFRESH_INTERVAL);
    document.getElementById('last-refresh').textContent = new Date().toLocaleTimeString();
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
}

function showEmpty() {
  const grid = document.getElementById('grid');
  if (!grid.querySelector('.empty-state')) {
    grid.innerHTML = `<div class="empty-state">
      <div class="big-icon">📈</div>
      <h2>No stocks trac
